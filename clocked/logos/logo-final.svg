<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Rounded square app icon background -->
  <rect width="400" height="400" rx="80" fill="#0F0F0F"/>

  <!-- Tilted banner group -->
  <g transform="rotate(-10, 200, 200)">
    <!-- Banner background -->
    <rect x="36" y="168" width="328" height="64" rx="6" fill="#7BA7FF"/>
    <!-- Top line -->
    <rect x="36" y="168" width="328" height="5" rx="2" fill="#a8c8ff"/>
    <!-- Bottom line -->
    <rect x="36" y="227" width="328" height="5" rx="2" fill="#4a6fd4"/>

    <!-- CLOCKED text centered -->
    <text x="207" y="218" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#0F0F0F" letter-spacing="3">CLOCKED</text>


  </g>
</svg>
