<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0F0F"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="oClockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1E40AF"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E2E8F0"/>
    </linearGradient>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2563EB" flood-opacity="0.3"/>
    </filter>
    <filter id="clockGlow7">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="72" fill="url(#bg7)"/>

  <!-- Wordmark layout: CL_CKED with clock as O -->
  <!-- Using custom paths for bold letters -->

  <!-- "CL" -->
  <text x="34" y="232" font-family="'Arial Black', 'Impact', sans-serif" font-size="88" font-weight="900" fill="url(#textGrad)" filter="url(#textShadow)" letter-spacing="-2">CL</text>

  <!-- Clock as "O" -->
  <g filter="url(#clockGlow7)">
    <!-- Clock circle replacing O -->
    <circle cx="209" cy="185" r="46" fill="url(#oClockGrad)"/>
    <circle cx="209" cy="185" r="46" fill="none" stroke="#60A5FA" stroke-width="3" opacity="0.5"/>

    <!-- Clock face detail -->
    <circle cx="209" cy="185" r="38" fill="#1A2E5E"/>

    <!-- Tick marks -->
    <g stroke="rgba(255,255,255,0.6)" stroke-width="2">
      <line x1="209" y1="149" x2="209" y2="159"/>
      <line x1="209" y1="211" x2="209" y2="221"/>
      <line x1="173" y1="185" x2="183" y2="185"/>
      <line x1="235" y1="185" x2="245" y2="185"/>
    </g>

    <!-- Clock hands -->
    <line x1="209" y1="185" x2="209" y2="158" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="209" y1="185" x2="229" y2="176" stroke="rgba(255,255,255,0.8)" stroke-width="3" stroke-linecap="round"/>
    <!-- Second hand -->
    <line x1="209" y1="185" x2="196" y2="210" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>

    <!-- Center -->
    <circle cx="209" cy="185" r="5" fill="white"/>
  </g>

  <!-- "CKED" -->
  <text x="258" y="232" font-family="'Arial Black', 'Impact', sans-serif" font-size="88" font-weight="900" fill="url(#textGrad)" filter="url(#textShadow)" letter-spacing="-2">CKED</text>

  <!-- Underline accent -->
  <rect x="34" y="246" width="332" height="5" rx="3" fill="url(#oClockGrad)" opacity="0.7"/>

  <!-- Tagline -->
  <text x="200" y="290" font-family="'Arial', sans-serif" font-size="13" font-weight="400" fill="rgba(148,163,184,0.8)" text-anchor="middle" letter-spacing="5">EMPLOYER REVIEWS</text>
</svg>
