<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0F0F"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="clockFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A6E"/>
      <stop offset="100%" style="stop-color:#162A52"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#2563EB" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="72" fill="url(#bg2)"/>

  <!-- Speech bubble body -->
  <g filter="url(#shadow2)">
    <path d="M 80 90 Q 80 65 105 65 L 295 65 Q 320 65 320 90 L 320 240 Q 320 265 295 265 L 185 265 L 155 305 L 150 265 L 105 265 Q 80 265 80 240 Z" fill="url(#bubbleGrad)"/>
  </g>

  <!-- Inner clock face inside bubble -->
  <circle cx="200" cy="165" r="72" fill="url(#clockFace)"/>
  <circle cx="200" cy="165" r="72" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- Clock tick marks -->
  <g stroke="rgba(255,255,255,0.5)" stroke-width="2">
    <line x1="200" y1="97" x2="200" y2="108"/>
    <line x1="200" y1="222" x2="200" y2="233"/>
    <line x1="132" y1="165" x2="143" y2="165"/>
    <line x1="257" y1="165" x2="268" y2="165"/>
    <line x1="248" y1="109" x2="243" y2="119" stroke-width="1.5" opacity="0.4"/>
    <line x1="267" y1="213" x2="257" y2="207" stroke-width="1.5" opacity="0.4"/>
    <line x1="152" y1="109" x2="157" y2="119" stroke-width="1.5" opacity="0.4"/>
    <line x1="133" y1="213" x2="143" y2="207" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Hour hand -->
  <line x1="200" y1="165" x2="200" y2="120" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="200" y1="165" x2="238" y2="145" stroke="rgba(255,255,255,0.7)" stroke-width="4" stroke-linecap="round"/>
  <!-- Second hand -->
  <line x1="200" y1="165" x2="178" y2="204" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
  <!-- Center -->
  <circle cx="200" cy="165" r="5" fill="white"/>

  <!-- Dots pattern on bubble (subtle) -->
  <circle cx="120" cy="240" r="3" fill="rgba(255,255,255,0.25)"/>
  <circle cx="140" cy="240" r="3" fill="rgba(255,255,255,0.25)"/>
  <circle cx="160" cy="240" r="3" fill="rgba(255,255,255,0.25)"/>

  <!-- Wordmark -->
  <text x="200" y="358" font-family="'Arial Black', 'Impact', sans-serif" font-size="34" font-weight="900" fill="white" text-anchor="middle" letter-spacing="4">CLOCKED</text>
</svg>
