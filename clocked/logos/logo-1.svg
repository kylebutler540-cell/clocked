<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0F0F0F"/>
    </linearGradient>
    <linearGradient id="clockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1E40AF"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="72" fill="url(#bg1)"/>

  <!-- Outer ring -->
  <circle cx="200" cy="185" r="130" fill="none" stroke="url(#ringGrad)" stroke-width="10" opacity="0.3"/>

  <!-- Clock face -->
  <circle cx="200" cy="185" r="118" fill="#161B27"/>
  <circle cx="200" cy="185" r="118" fill="none" stroke="url(#clockGrad)" stroke-width="8"/>

  <!-- Hour tick marks -->
  <g stroke="#3B82F6" stroke-width="3" opacity="0.6">
    <line x1="200" y1="74" x2="200" y2="88"/>
    <line x1="200" y1="282" x2="200" y2="296"/>
    <line x1="89" y1="185" x2="103" y2="185"/>
    <line x1="297" y1="185" x2="311" y2="185"/>
    <!-- Minor ticks -->
    <line x1="255" y1="79" x2="250" y2="92" stroke-width="2" opacity="0.4"/>
    <line x1="307" y1="131" x2="294" y2="136" stroke-width="2" opacity="0.4"/>
    <line x1="307" y1="239" x2="294" y2="234" stroke-width="2" opacity="0.4"/>
    <line x1="255" y1="291" x2="250" y2="278" stroke-width="2" opacity="0.4"/>
    <line x1="145" y1="79" x2="150" y2="92" stroke-width="2" opacity="0.4"/>
    <line x1="93" y1="131" x2="106" y2="136" stroke-width="2" opacity="0.4"/>
    <line x1="93" y1="239" x2="106" y2="234" stroke-width="2" opacity="0.4"/>
    <line x1="145" y1="291" x2="150" y2="278" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Hour hand (pointing to 10) -->
  <line x1="200" y1="185" x2="157" y2="133" stroke="white" stroke-width="7" stroke-linecap="round" filter="url(#glow1)"/>
  <!-- Minute hand (pointing to 2) -->
  <line x1="200" y1="185" x2="243" y2="133" stroke="url(#clockGrad)" stroke-width="5" stroke-linecap="round" filter="url(#glow1)"/>
  <!-- Center dot -->
  <circle cx="200" cy="185" r="8" fill="url(#clockGrad)"/>
  <circle cx="200" cy="185" r="4" fill="white"/>

  <!-- Checkmark (bottom right, overlaid) -->
  <circle cx="284" cy="269" r="38" fill="#0F0F0F" stroke="url(#clockGrad)" stroke-width="3"/>
  <circle cx="284" cy="269" r="33" fill="url(#clockGrad)"/>
  <polyline points="268,269 279,281 302,256" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="200" y="358" font-family="'Arial Black', 'Impact', sans-serif" font-size="34" font-weight="900" fill="white" text-anchor="middle" letter-spacing="4">CLOCKED</text>
</svg>
