<!DOCTYPE html>
<html>
<head>
<style>
body { background: #111; margin: 0; padding: 20px; font-family: sans-serif; }
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
.card { background: #1a1a1a; border-radius: 12px; padding: 16px; text-align: center; }
.card img { width: 120px; height: 120px; }
.card p { color: #888; font-size: 12px; margin: 8px 0 0; }
</style>
</head>
<body>
<div class="grid">
  <div class="card"><img src="logo-1.svg"><p>1 — Clock + Checkmark</p></div>
  <div class="card"><img src="logo-2.svg"><p>2 — Speech Bubble + Clock</p></div>
  <div class="card"><img src="logo-3.svg"><p>3 — C Lettermark</p></div>
  <div class="card"><img src="logo-4.svg"><p>4 — Rating Arrow</p></div>
  <div class="card"><img src="logo-5.svg"><p>5 — Punch Card</p></div>
  <div class="card"><img src="logo-6.svg"><p>6 — Clock + Eye</p></div>
  <div class="card"><img src="logo-7.svg"><p>7 — Wordmark</p></div>
  <div class="card"><img src="logo-8.svg"><p>8 — Review Cards</p></div>
  <div class="card"><img src="logo-9.svg"><p>9 — Cracked Clock</p></div>
  <div class="card"><img src="logo-10.svg"><p>10 — Shield + Clock</p></div>
</div>
</body>
</html>
