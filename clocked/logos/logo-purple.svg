<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4B0082"/>
      <stop offset="100%" stop-color="#7B2FBE"/>
    </linearGradient>
  </defs>

  <!-- White rounded square background -->
  <rect width="400" height="400" rx="80" fill="#FFFFFF"/>

  <!-- "clocked" lowercase, centered, gradient purple -->
  <text x="200" y="230" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial Black, sans-serif" font-weight="900" font-size="82" fill="url(#textGrad)" letter-spacing="-2">clocked</text>
</svg>
