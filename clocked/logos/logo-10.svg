<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0F1E"/>
      <stop offset="100%" style="stop-color:#0F0F0F"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="50%" style="stop-color:#1D4ED8"/>
      <stop offset="100%" style="stop-color:#1E3A8A"/>
    </linearGradient>
    <linearGradient id="shieldInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2E60"/>
      <stop offset="100%" style="stop-color:#111D45"/>
    </linearGradient>
    <linearGradient id="handGrad10" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" style="stop-color:#FFFFFF"/>
    </linearGradient>
    <filter id="shieldGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerGlow10">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="shieldClip">
      <path d="M 200 52 L 298 88 L 298 185 Q 298 265 200 308 Q 102 265 102 185 L 102 88 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="72" fill="url(#bg10)"/>

  <!-- Subtle radial background glow -->
  <circle cx="200" cy="185" r="170" fill="rgba(37,99,235,0.05)"/>

  <!-- Shield shape (outer stroke/glow) -->
  <g filter="url(#shieldGlow)">
    <path d="M 200 52 L 298 88 L 298 185 Q 298 265 200 308 Q 102 265 102 185 L 102 88 Z" fill="none" stroke="url(#shieldGrad)" stroke-width="3" opacity="0.7"/>
  </g>

  <!-- Shield fill -->
  <path d="M 200 52 L 298 88 L 298 185 Q 298 265 200 308 Q 102 265 102 185 L 102 88 Z" fill="url(#shieldGrad)"/>

  <!-- Shield inner surface -->
  <path d="M 200 68 L 283 98 L 283 185 Q 283 250 200 288 Q 117 250 117 185 L 117 98 Z" fill="url(#shieldInner)"/>

  <!-- Clock face inside shield -->
  <circle cx="200" cy="185" r="70" fill="#0D1829" clip-path="url(#shieldClip)"/>
  <circle cx="200" cy="185" r="70" fill="none" stroke="rgba(59,130,246,0.4)" stroke-width="2" clip-path="url(#shieldClip)"/>

  <!-- Clock tick marks -->
  <g stroke="rgba(255,255,255,0.5)" stroke-width="2.5" clip-path="url(#shieldClip)">
    <line x1="200" y1="117" x2="200" y2="129"/>
    <line x1="200" y1="241" x2="200" y2="253"/>
    <line x1="132" y1="185" x2="144" y2="185"/>
    <line x1="256" y1="185" x2="268" y2="185"/>
  </g>
  <!-- Minor ticks -->
  <g stroke="rgba(255,255,255,0.2)" stroke-width="1.5" clip-path="url(#shieldClip)">
    <line x1="249" y1="128" x2="244" y2="137"/>
    <line x1="257" y1="234" x2="248" y2="228"/>
    <line x1="151" y1="128" x2="156" y2="137"/>
    <line x1="143" y1="234" x2="152" y2="228"/>
  </g>

  <!-- Clock hands -->
  <g filter="url(#innerGlow10)" clip-path="url(#shieldClip)">
    <!-- Hour hand pointing to 10 -->
    <line x1="200" y1="185" x2="166" y2="148" stroke="url(#handGrad10)" stroke-width="7" stroke-linecap="round"/>
    <!-- Minute hand pointing to 12 -->
    <line x1="200" y1="185" x2="200" y2="128" stroke="rgba(96,165,250,0.9)" stroke-width="5" stroke-linecap="round"/>
    <!-- Second hand -->
    <line x1="200" y1="185" x2="222" y2="218" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Clock center -->
  <circle cx="200" cy="185" r="9" fill="url(#shieldGrad)" clip-path="url(#shieldClip)"/>
  <circle cx="200" cy="185" r="4.5" fill="white" clip-path="url(#shieldClip)"/>

  <!-- Shield decorative top notch / lock hint -->
  <path d="M 185 52 Q 200 46 215 52 L 215 62 Q 200 56 185 62 Z" fill="rgba(255,255,255,0.1)"/>

  <!-- Wordmark -->
  <text x="200" y="370" font-family="'Arial Black', 'Impact', sans-serif" font-size="34" font-weight="900" fill="white" text-anchor="middle" letter-spacing="4">CLOCKED</text>
</svg>
